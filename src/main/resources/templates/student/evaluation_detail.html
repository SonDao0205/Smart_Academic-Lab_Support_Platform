<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{common/layout :: head}">
    <title>Chi tiết hồ sơ tư vấn</title>
</head>
<body>
<div class="wrapper">
    <nav th:replace="~{common/layout :: sidebar}"></nav>

    <div class="main-content">
        <div class="container-fluid mt-4">
            <div class="d-flex align-items-center mb-4">
                <a th:href="@{/student/history}" class="btn btn-light rounded-circle mr-3 shadow-sm">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h3 class="font-weight-bold text-dark mb-0">Hồ sơ Đánh giá tư vấn</h3>
            </div>

            <div class="row">
                <!-- Thông tin chung -->
                <div class="col-md-4">
                    <div class="card shadow border-0 mb-4">
                        <div class="card-body">
                            <h5 class="font-weight-bold text-primary mb-3">Thông tin buổi tư vấn</h5>
                            <hr>
                            <p class="mb-2"><strong>Giảng viên:</strong> <span th:text="${sessionDetail.lecturer.user.fullName}"></span></p>
                            <p class="mb-2"><strong>Khoa:</strong> <span th:text="${sessionDetail.lecturer.department.name}"></span></p>
                            <p class="mb-2"><strong>Ngày thực hiện:</strong> <span th:text="${sessionDetail.bookingDate}"></span></p>
                            <p class="mb-0"><strong>Thời gian:</strong> <span th:text="${sessionDetail.startTime} + ' - ' + ${sessionDetail.endTime}"></span></p>
                        </div>
                    </div>
                </div>

                <!-- Nội dung đánh giá -->
                <div class="col-md-8">
                    <div class="card shadow border-0">
                        <div class="card-header bg-white py-3 border-bottom-0">
                            <h5 class="font-weight-bold text-success mb-0">
                                <i class="fas fa-comment-medical mr-2"></i>Nội dung đánh giá từ giảng viên
                            </h5>
                        </div>
                        <div class="card-body bg-light mx-3 mb-3 rounded border">
                            <p class="mb-0 text-dark" style="white-space: pre-wrap; line-height: 1.6;"
                               th:text="${evaluation.content}">
                                Nội dung đánh giá sẽ hiển thị tại đây.
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <footer th:replace="~{common/layout :: footer}"></footer>
    </div>
</div>
</body>
</html>
