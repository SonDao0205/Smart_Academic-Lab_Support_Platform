<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{student/home :: head}">
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

    <div class="wrapper">
        <!-- Nhúng Sidebar từ trang layout -->
        <nav th:replace="~{student/home :: sidebar}"></nav>

        <div class="main-content">
            <div class="container-fluid">
                <!-- Header trang -->
                <div class="mb-4">
                    <h3 class="font-weight-bold text-success">Thông tin cá nhân</h3>
                    <p class="text-muted">Quản lý thông tin tài khoản của bạn</p>
                </div>

                <div class="row">
                    <!-- CỘT 1: THÔNG TIN TỔNG QUAN -->
                    <div class="col-lg-4">
                        <div class="card shadow-sm border-0 rounded-lg text-center p-4 mb-4">
                            <div class="mb-3">
                                <!-- Avatar giả lập -->
                                <div class="rounded-circle bg-light d-inline-flex align-items-center justify-content-center"
                                     style="width: 120px; height: 120px; border: 4px solid #e8f5e9;">
                                    <i class="fas fa-user-graduate fa-4x text-success"></i>
                                </div>
                            </div>
                            <h4 class="font-weight-bold mb-1" th:text="${user.fullName}">Nguyễn Văn A</h4>
                            <p class="text-muted mb-3" th:text="${user.userCode}">SV123456</p>

                            <div class="badge badge-pill badge-success px-3 py-2 mb-3" th:text="${user.role}">
                                STUDENT
                            </div>

                            <hr class="w-100">

                            <div class="text-left small mt-2">
                                <p class="mb-1"><strong>Trạng thái:</strong>
                                    <span th:class="${user.status ? 'text-success' : 'text-danger'}"
                                          th:text="${user.status ? 'Đang hoạt động' : 'Bị khóa'}">
                                    </span>
                                </p>
                                <p class="mb-0 text-muted italic">* Thông tin mã sinh viên và vai trò không thể thay
                                    đổi.</p>
                            </div>
                        </div>
                    </div>

                    <!-- CỘT 2: FORM CHI TIẾT -->
                    <div class="col-lg-8">
                        <div class="card shadow-sm border-0 rounded-lg p-4">
                            <h5 class="font-weight-bold mb-4 border-bottom pb-2">Chi tiết hồ sơ</h5>

                            <form th:action="@{/student/profile/update}" th:object="${user}" method="post">
                                <div class="row">
                                    <!-- Họ tên -->
                                    <div class="col-md-6 form-group">
                                        <label class="font-weight-600">Họ và tên</label>
                                        <input type="text" th:field="*{fullName}" class="form-control"
                                               placeholder="Nhập họ tên">
                                        <small class="text-danger" th:if="${#fields.hasErrors('fullName')}"
                                               th:errors="*{fullName}"></small>
                                    </div>

                                    <!-- Mã sinh viên (Read-only) -->
                                    <div class="col-md-6 form-group">
                                        <label class="font-weight-600 text-muted">Mã người dùng (Mã SV)</label>
                                        <input type="text" th:field="*{userCode}" class="form-control bg-light" readonly>
                                    </div>

                                    <!-- Email -->
                                    <div class="col-md-6 form-group">
                                        <label class="font-weight-600">Email liên lạc</label>
                                        <input type="email" th:field="*{email}" class="form-control"
                                               placeholder="example@gmail.com">
                                        <small class="text-danger" th:if="${#fields.hasErrors('email')}"
                                               th:errors="*{email}"></small>
                                    </div>

                                    <!-- Số điện thoại -->
                                    <div class="col-md-6 form-group">
                                        <label class="font-weight-600">Số điện thoại</label>
                                        <input type="text" th:field="*{phone}" class="form-control"
                                               placeholder="09xxxxxxxx">
                                        <small class="text-danger" th:if="${#fields.hasErrors('phone')}"
                                               th:errors="*{phone}"></small>
                                    </div>

                                    <!-- Mật khẩu (Chỉ hiển thị nút đổi mật khẩu hoặc input password) -->
                                    <div class="col-md-12 form-group">
                                        <label class="font-weight-600">Mật khẩu</label>
                                        <div class="input-group">
                                            <input type="password" value="********" class="form-control bg-light" readonly>
                                            <div class="input-group-append">
                                                <button class="btn btn-outline-secondary" type="button">Đổi mật khẩu
                                                </button>
                                            </div>
                                        </div>
                                        <input type="hidden" th:field="*{password}"> <!-- Giữ lại password cũ -->
                                    </div>
                                </div>

                                <div class="mt-4 text-right">
                                    <button type="reset" class="btn btn-light mr-2">Hủy bỏ</button>
                                    <button type="submit" class="btn btn-success px-4">Lưu thay đổi</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
