<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng nhập - Smart Academy</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="container">
    <!-- Sửa class register-header thành auth-header -->
    <div class="auth-header">
        <h2>Chào mừng trở lại</h2>
        <p class="text-muted">Vui lòng đăng nhập để tiếp tục</p>
    </div>

    <form th:action="@{/login}" th:object="${user}" method="post">
        <div class="form-group">
            <label>Email</label>
            <input type="email" th:field="*{email}" class="form-control" placeholder="Nhập email của bạn" required>
            <small class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" th:field="*{password}" class="form-control" placeholder="******" required>
            <small class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
        </div>

        <div class="form-group d-flex justify-content-between align-items-center">
            <div class="custom-control custom-checkbox">
                <input type="checkbox" class="custom-control-input" id="rememberMe">
                <label class="custom-control-label text-muted" for="rememberMe" style="font-size: 0.9rem;">Ghi nhớ</label>
            </div>
            <a href="#" class="text-success" style="font-size: 0.9rem;">Quên mật khẩu?</a>
        </div>

        <!-- Sửa class btn-register thành btn-auth -->
        <button type="submit" class="btn btn-auth">Đăng nhập</button>

        <!-- Sửa class login-link thành redirect-link -->
        <div class="redirect-link">
            Bạn chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a>
        </div>
    </form>
</div>
<div th:replace="~{common/fragments :: toast-script}"></div>
</body>
</html>
