<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{common/layout :: head}">
    <title>Duyệt yêu cầu</title>
</head>
<body>
<div class="wrapper">
    <!--Sidebar theo role-->
    <nav th:replace="~{common/layout :: sidebar}"></nav>

    <div class="main-content">
        <div class="container-fluid mt-4">
            <div class="d-flex justify-content-between mb-3">
                <h4 class="text-primary font-weight-bold">Chi tiết đơn mượn #<span th:text="${borrowing.id}"></span>
                </h4>
                <a th:href="@{/admin/approve_request}" class="btn btn-secondary btn-sm">Quay lại</a>
            </div>
            <div class="card shadow border-0">
                <div class="table-responsive">
                    <table class="table table-bordered mb-0">
                        <thead class="thead-dark">
                        <tr>
                            <th>Thiết bị</th>
                            <th>Số lượng mượn</th>
                            <th>Trạng thái</th>
                            <th class="text-center">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="d : ${borrowing.details}">
                            <td th:text="${d.equipment.name}"></td>
                            <td th:text="${d.quantity}"></td>
                            <td>
                                <span th:if="${d.status == 'REQUESTED'}" class="text-warning">Chờ duyệt</span>
                                <span th:if="${d.status == 'APPROVED'}" class="text-success">Đã cấp</span>
                                <span th:if="${d.status == 'REJECTED'}" class="text-danger">Từ chối</span>
                            </td>
                            <td class="text-center">
                                <div th:if="${d.status == 'REQUESTED'}">
                                    <a th:href="@{/admin/approve_request/approve/{id}(id=${d.id})}"
                                       class="btn btn-sm btn-success mr-2"
                                       onclick="return confirm('Xác nhận cấp phát?')">Xác nhận</a>
                                    <a th:href="@{/admin/approve_request/reject/{id}(id=${d.id})}"
                                       class="btn btn-sm btn-danger">Từ chối</a>
                                </div>
                                <span th:unless="${d.status == 'REQUESTED'}" class="text-muted small">N/A</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <!--Footer chung-->
        <footer th:replace="~{common/layout :: footer}"></footer>
    </div>
</div>
<div th:replace="~{common/fragments :: toast-script}"></div>
</body>
</html>
