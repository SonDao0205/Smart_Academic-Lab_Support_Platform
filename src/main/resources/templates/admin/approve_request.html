<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{common/layout :: head}">
    <title>Duyệt yêu cầu</title>
</head>
<body>
<div class="wrapper">
    <!--Sidebar theo role-->
    <nav th:replace="~{common/layout :: sidebar}"></nav>

    <div class="main-content">
        <div class="container-fluid mt-4">
            <h3 class="text-primary font-weight-bold">Danh sách yêu cầu cấp phát</h3>
            <div class="card shadow border-0 mt-3">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                        <tr>
                            <th>ID</th>
                            <th>Giảng viên</th>
                            <th>Sinh viên</th>
                            <th>Trạng thái</th>
                            <th class="text-center">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(requests)}">
                            <td colspan="5" class="text-center py-5">
                                <div class="empty-state">
                                    <i class="fas fa-folder-open fa-3x text-muted mb-3"></i>
                                    <h5 class="text-secondary">Chưa có đơn nào để duyệt</h5>
                                    <p class="text-muted small">Tất cả các yêu cầu cấp phát thiết bị đã được xử lý
                                        xong.</p>
                                </div>
                            </td>
                        </tr>
                        <tr th:unless="${#lists.isEmpty(requests)}" th:each="item : ${requests}">
                            <td th:text="${item.id}"></td>
                            <td th:text="${item.lecturer.user.fullName}"></td>
                            <td th:text="${item.user.fullName}"></td>
                            <td>
                            <span class="badge badge-warning text-dark">
                                <i class="fas fa-clock mr-1"></i> Chờ duyệt
                            </span>
                            </td>
                            <td class="text-center">
                                <a th:href="@{/admin/approve_request/detail/{id}(id=${item.id})}"
                                   class="btn btn-sm btn-info shadow-sm">
                                    <i class="fas fa-search-plus mr-1"></i> Xem chi tiết
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <!--Footer chung-->
        <footer th:replace="~{common/layout :: footer}"></footer>
    </div>
</div>
<div th:replace="~{common/fragments :: toast-script}"></div>
</body>
</html>
