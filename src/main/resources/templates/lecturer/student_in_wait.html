<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{common/layout :: head}">
    <title>Danh sách sinh viên chờ tư vấn</title>
</head>
<body>
<div class="wrapper">
    <nav th:replace="~{common/layout :: sidebar}"></nav>

    <div class="main-content">
        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="font-weight-bold text-primary">Sinh viên chờ tư vấn</h3>
                    <p class="text-muted">Quản lý các yêu cầu tư vấn từ sinh viên</p>
                </div>
            </div>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${success}"></span>
                <button type="button" class="close" data-dismiss="alert">&times;</button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${error}"></span>
                <button type="button" class="close" data-dismiss="alert">&times;</button>
            </div>

            <div class="card shadow border-0">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="thead-light">
                            <tr>
                                <th class="px-4">#</th>
                                <th>Sinh viên</th>
                                <th>Mã SV</th>
                                <th>Ngày hẹn</th>
                                <th>Thời gian</th>
                                <th>Trạng thái</th>
                                <th class="text-center">Thao tác</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(waitingList)}">
                                <td colspan="7" class="text-center py-5 text-muted">
                                    Hiện tại không có sinh viên nào đang chờ tư vấn.
                                </td>
                            </tr>
                            <tr th:each="item: ${waitingList}">
                                <td class="px-4" th:text="${item.id}">1</td>
                                <td>
                                    <span class="font-weight-bold" th:text="${item.student.fullName}"></span>
                                </td>
                                <td th:text="${item.student.userCode}">SV001</td>
                                <td th:text="${item.bookingDate}">2026-05-08</td>
                                <td>
                                    <span class="badge badge-info-soft" th:text="${item.startTime} + ' - ' + ${item.endTime}"></span>
                                </td>
                                <td>
                                    <span th:switch="${item.status}">
                                        <span th:case="'pending'" class="badge badge-warning">Chờ duyệt</span>
                                        <span th:case="'approved'" class="badge badge-success">Đã duyệt</span>
                                        <span th:case="'completed'" class="badge badge-primary">Đã hoàn thành</span>
                                        <span th:case="'rejected'" class="badge badge-danger">Đã từ chối</span>
                                        <span th:case="*" class="badge badge-secondary" th:text="${item.status}"></span>
                                    </span>
                                </td>
                                <td class="text-center">
                                    <a th:if="${item.status == 'pending'}"
                                       th:href="@{/lecturer/evaluation(sessionId=${item.id})}"
                                       class="btn btn-sm btn-primary mr-1">
                                        <i class="fas fa-edit mr-1"></i> Đánh giá
                                    </a>

                                    <a th:if="${item.status == 'pending'}"
                                       th:href="@{/lecturer/waiting-list/reject/{id}(id=${item.id})}"
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('Bạn có chắc chắn muốn từ chối buổi tư vấn này?')">
                                        <i class="fas fa-ban mr-1"></i> Từ chối
                                    </a>

                                    <span th:if="${item.status == 'completed' or item.status == 'rejected'}" class="text-muted small">
                                        Không có thao tác
                                    </span>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        <footer th:replace="~{common/layout :: footer}"></footer>
    </div>
</div>
<div th:replace="~{common/fragments :: toast-script}"></div>
</body>
</html>
